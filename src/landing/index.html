<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaido Henrik Elias</title>
  <meta name="description" content="Software architect — projects and links">
  <link rel="preload" href="/assets/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/assets/fonts/inter-500.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/assets/site.css">
  <script defer src="/assets/analytics-consent.js" data-analytics-token="58734ed4ae1e4b4e8a8f8f7d50ff74f2" data-analytics-privacy-url="/privacy?lang=en"></script>
</head>
<body class="landing-home">

<div class="language-switcher" role="group" aria-label="Language" data-i18n-aria="languageLabel">
  <button type="button" data-lang-option="et" aria-pressed="false">ET</button>
  <button type="button" data-lang-option="en" aria-pressed="true">EN</button>
</div>

<main>
  <section class="landing-intro" aria-labelledby="landing-title">
    <div class="monogram" aria-hidden="true">KHE</div>
    <h1 id="landing-title">Kaido Henrik Elias</h1>
    <p class="tagline" data-i18n="tagline">Software architect by trade. Tinkerer by nature.</p>
  </section>

  <section class="portfolio-panel" aria-label="Projects" data-i18n-aria="projectsLabel">
    <div class="project-list">
      <a class="project-item project-lab" href="/lab/?lang=en" data-link="lab">
        <span class="project-index">01</span>
        <div class="project-copy">
          <h3 data-i18n="labTitle">Lab Atlas</h3>
          <p data-i18n="labDesc">A public map of the self-hosted Tallinn lab: services, boundaries, and operating model in one inspectable interface.</p>
        </div>
        <span class="project-arrow" aria-hidden="true">→</span>
      </a>

      <a class="project-item project-games" href="https://games.khe.ee/?lang=en" data-link="games">
        <span class="project-index">02</span>
        <div class="project-copy">
          <h3 data-i18n="gamesTitle">Games</h3>
          <p data-i18n="gamesDesc">A small games shelf for learning, logic, and AI-narrated group adventures.</p>
        </div>
        <span class="project-arrow" aria-hidden="true">→</span>
      </a>
    </div>
  </section>
</main>

<footer class="site-footer" data-site-footer></footer>

<script type="module">
  import { createLocaleController } from '/assets/site-locale.js';
  import { renderSiteFooter, withSiteFooterCopy } from '/assets/site-footer.js';

  const COPY = {
    et: {
      title: 'Kaido Henrik Elias',
      description: 'Tarkvaraarhitekt — projektid ja lingid',
      languageLabel: 'Keel',
      projectsLabel: 'Projektid',
      tagline: 'Töölt tarkvaraarhitekt. Loomult nokitseja.',
      labTitle: 'Lab Atlas',
      labDesc: 'Tallinna kodulabi teenused ja piirid ühes vaates.',
      gamesTitle: 'Mängud',
      gamesDesc: 'Õppemängud ja AI seiklus ühe väikese mänguriiulina.',
    },
    en: {
      title: 'Kaido Henrik Elias',
      description: 'Software architect — projects and links',
      languageLabel: 'Language',
      projectsLabel: 'Projects',
      tagline: 'Software architect by trade. Tinkerer by nature.',
      labTitle: 'Lab Atlas',
      labDesc: 'The Tallinn home lab services and boundaries in one view.',
      gamesTitle: 'Games',
      gamesDesc: 'Learning games and an AI adventure in one small shelf.',
    },
  };

  const localPreviewHost = ['localhost', '127.0.0.1', '::1'].includes(window.location.hostname);
  const gamesOrigin = localPreviewHost
    ? `${window.location.protocol}//${window.location.hostname}:8788`
    : 'https://games.khe.ee';

  renderSiteFooter();

  createLocaleController({
    copy: withSiteFooterCopy(COPY),
    defaultLocale: 'en',
    links: {
      lab: (locale) => `/lab/?lang=${locale}`,
      games: (locale) => `${gamesOrigin}/?lang=${locale}`,
      privacy: (locale) => `/privacy?lang=${locale}`,
    },
  });
</script>

</body>
</html>
