<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaido Henrik Elias</title>
  <meta name="description" content="Software architect — projects and links">
  <link rel="preload" href="/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/inter-500.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 300;
      font-display: swap;
      src: url('/fonts/inter-300.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('/fonts/inter-400.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src: url('/fonts/inter-500.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 600;
      font-display: swap;
      src: url('/fonts/inter-600.woff2') format('woff2');
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #09090b;
      --text: #fafafa;
      --text-dim: #a1a1aa;
      --text-muted: #71717a;
      --text-faint: #52525b;
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.18);
      --accent-from: rgba(99, 102, 241, 0.15);
      --accent-to: rgba(139, 92, 246, 0.05);
      --accent-border: rgba(139, 92, 246, 0.25);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow-x: hidden;
    }

    /* subtle background glow — same as games launcher */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 60%;
      background: radial-gradient(ellipse at center, rgba(99, 102, 241, 0.08), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 3rem 1.5rem;
      position: relative;
      z-index: 1;
    }

    .language-switcher {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 2;
      display: inline-flex;
      gap: 0.2rem;
      padding: 0.18rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(6px);
    }

    .language-switcher button {
      min-width: 2.7rem;
      min-height: 2.35rem;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font: 600 0.7rem/1 'Inter', system-ui;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .language-switcher button[aria-pressed="true"] {
      border-color: var(--accent-border);
      background: rgba(139, 92, 246, 0.18);
      color: var(--text);
    }

    .language-switcher button:focus-visible {
      outline: 2px solid var(--accent-border);
      outline-offset: 2px;
    }

    .monogram {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      border-radius: 18px;
      border: 1px solid var(--accent-border);
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      font-size: 1.625rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text);
      margin-bottom: 2rem;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 20px -4px rgba(99, 102, 241, 0.15);
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .tagline {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 300;
      margin-bottom: 2rem;
    }

    nav {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    nav a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.125rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 400;
      transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1),
                  border-color 0.2s,
                  color 0.2s;
      backdrop-filter: blur(6px);
    }

    nav a:hover {
      transform: translateY(-3px);
      border-color: var(--border-hover);
      color: var(--text);
    }

    nav a:focus-visible,
    footer a:focus-visible {
      outline: 2px solid var(--accent-border);
      outline-offset: 3px;
      border-radius: 10px;
    }

    nav svg {
      width: 16px;
      height: 16px;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    nav a:hover svg { opacity: 1; }

    footer {
      padding: 2rem 1.5rem;
      text-align: center;
      color: var(--text-faint);
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      position: relative;
      z-index: 1;
    }

    footer .divider {
      margin: 0 0.5rem;
      color: var(--text-faint);
      opacity: 0.5;
    }

    footer a {
      color: var(--text-faint);
      text-decoration: none;
      transition: color 0.15s;
    }

    footer a:hover { color: var(--text-dim); }

    @media (max-width: 480px) {
      .language-switcher { top: 1rem; right: 1rem; }
      h1 { font-size: 2rem; }
      nav { flex-direction: column; align-items: stretch; max-width: 240px; margin: 0 auto; }
      nav a { justify-content: center; }
    }
  </style>
</head>
<body>

<div class="language-switcher" role="group" aria-label="Language" data-i18n-aria="languageLabel">
  <button type="button" data-lang-option="et" aria-pressed="false">ET</button>
  <button type="button" data-lang-option="en" aria-pressed="true">EN</button>
</div>

<main>
  <div class="monogram">KHE</div>
  <h1>Kaido Henrik Elias</h1>
  <p class="tagline" data-i18n="tagline">Software architect by trade. Tinkerer by nature.</p>

  <nav>
    <a href="https://games.khe.ee/?lang=en" data-link="games">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4M8 10v4"/><circle cx="15" cy="10.5" r="1"/><circle cx="18" cy="13.5" r="1"/></svg>
      <span data-i18n="gamesLink">Games</span>
    </a>
    <a href="https://github.com/khelias" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      GitHub
    </a>
    <a href="https://www.linkedin.com/in/kaido-henrik-elias/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      LinkedIn
    </a>
  </nav>
</main>

<footer>
  <span data-i18n="footer">Self-hosted in Tallinn</span>
  <span class="divider">·</span>
  <a href="/privacy?lang=en" data-i18n="privacyLink" data-link="privacy">Privacy</a>
</footer>

<script type="module">
  import { createLocaleController } from '/assets/site-locale.js';

  const COPY = {
    et: {
      title: 'Kaido Henrik Elias',
      description: 'Tarkvaraarhitekt — projektid ja lingid',
      languageLabel: 'Keel',
      tagline: 'Ehitan tarkvara, väikseid mänge ja kodust pilve.',
      gamesLink: 'Mängud',
      footer: 'Self-hosted in Tallinn',
      privacyLink: 'Privaatsus',
    },
    en: {
      title: 'Kaido Henrik Elias',
      description: 'Software architect — projects and links',
      languageLabel: 'Language',
      tagline: 'Software architect by trade. Tinkerer by nature.',
      gamesLink: 'Games',
      footer: 'Self-hosted in Tallinn',
      privacyLink: 'Privacy',
    },
  };

  createLocaleController({
    copy: COPY,
    defaultLocale: 'en',
    links: {
      games: (locale) => `https://games.khe.ee/?lang=${locale}`,
      privacy: (locale) => `/privacy?lang=${locale}`,
    },
  });
</script>

</body>
</html>
